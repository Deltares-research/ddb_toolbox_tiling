element:
- style: popupmenu
  text: Max Zoom
  position:
    x: 110
    y: 110
    width: 50
    height: 20
  select: item
  variable: max_zoom
  tooltip: Maximum zoom level
  method: edit_variables
  option_string:
    variable: zoom_levels_text
  option_value:
    variable: zoom_levels
- style: pushbutton
  text: Generate Index Tiles
  position:
    x: 20
    y: 85
    width: 150
    height: 20
  method: generate_index_tiles
  tooltip: Generate index tiles for the current domain
- style: edit
  text: Z max
  text_position: left
  position:
    x: 110
    y: 60
    width: 60
    height: 20
  variable: index_zmax
  type: float
  tooltip: Maximum elevation (m) for masking index tiles (HurryWave only)
- style: edit
  text: Z min
  text_position: left
  position:
    x: 110
    y: 35
    width: 60
    height: 20
  variable: index_zmin
  type: float
  tooltip: Minimum elevation (m) for masking index tiles (HurryWave only)
